    <!-- ARTICLE -->
    <article>
        <h2 align="center">Student Registration Form</h2>

        <form>
		 <table align="center" border="1" cellpadding="8">
		  <tr>

             <td> Name: <input type="text" placeholder="Enter your name"> </td><br> </tr>

             <td> Email: <input type="email" placeholder="Enter email"></td><br></tr>

             <td> Password: <input type="password"></td><br><br>

             <td> Age: <input type="number"></td><br>

             <td> Date of Birth: <input type="date"></td><br>

             <td> Gender:
             <input type="radio" name="gender"> Male
             <input type="radio" name="gender"> Female
             <br><br>
             </td>
           <td> Department:
             <select>
                 <option>Select Course</option>
                 <option>BBA</option>
                 <option>BCA</option>
                 <option>MBA</option>
             </select>
			</td>
            <br><br>

           <td> Skills:
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
            </td>
			<br><br>
           <td>
            <input type="submit" value="Register">
            <input type="reset" value="Clear">
          </td>
		 </table>
       </form>
    </article>

</section>
